<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MID - Secure Authentication Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium dark palette from main site */
            --black-deep: #030406; /* Deeper space black */
            --black: #0A0C10;
            --black-elevated: #14161D;
            
            /* Blue accent — trust, reliability, innovation */
            --blue: #4A8FE7;
            --blue-light: #6BA3ED;
            --cyan-glow: #00F0FF; /* Adding cyber-cyan for vanguard feel */
            --blue-glow: rgba(74,143,231,0.25);
            --blue-strong: rgba(74,143,231,0.4);

            /* Text hierarchy */
            --text-bright: #F4F5F7;
            --text-primary: #D4D8E0;
            --text-dim: #6B7280;

            /* Surfaces */
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(74,143,231,0.4);
            --glass: rgba(8, 10, 14, 0.4); /* Much more transparent for deep glass effect */
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            perspective: 1200px; /* Deep perspective for 3D card effect */
        }

        /* Starry Background Canvas */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 1;
            mix-blend-mode: screen;
        }

        /* Center glowing nebula - enhanced */
        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            max-width: 1200px; max-height: 1200px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.08) 0%, rgba(74, 143, 231, 0.03) 30%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: screen;
            animation: nebulaPulse 10s ease-in-out infinite alternate;
        }

        @keyframes nebulaPulse {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1.2; }
        }

        /* Top Bar Gov Simulation */
        .gov-topbar {
            width: 100%;
            background: linear-gradient(180deg, rgba(5, 7, 10, 0.8) 0%, transparent 100%);
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            position: absolute;
            top: 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .topbar-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 8px; height: 8px;
            background-color: var(--cyan-glow);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--cyan-glow), 0 0 24px var(--blue);
            animation: pulseFast 1.5s infinite alternate;
        }

        @keyframes pulseFast {
            0% { opacity: 0.6; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1.15); }
        }

        /* Main Login Panel Wrapper for 3D */
        .login-wrapper {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            transform-style: preserve-3d;
        }

        .auth-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 4.5rem 4rem;
            border-radius: 16px; /* Smoother premium card edge */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.15),
                        inset 0 0 40px rgba(74, 143, 231, 0.05);
            position: relative;
            opacity: 0;
            
            /* Entrance animation */
            transform: translateY(60px) scale(0.9) rotateX(10deg);
            animation: panelEntrance 1.5s cubic-bezier(0.19, 1, 0.22, 1) 0.3s forwards;
            
            /* 3D Magnetic Transform settings (handled by JS via custom properties usually, but hard transitions here) */
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Dynamic Sci-Fi Edge Glow */
        .auth-panel::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--cyan-glow) 0%, transparent 40%, transparent 60%, var(--blue) 100%);
            z-index: -1;
            opacity: 0.15;
            transition: opacity 0.5s ease;
            pointer-events: none;
            filter: blur(8px);
        }

        .login-wrapper:hover .auth-panel::after {
            opacity: 0.4;
            filter: blur(12px);
        }

        @keyframes panelEntrance {
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0) rotateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 4rem;
            transform: translateZ(40px); /* Deep 3D pop out */
        }

        .gold-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .system-title {
            font-size: 1.6rem;
            font-weight: 300; /* Thinner, more futuristic */
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .system-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--cyan-glow);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.8;
        }

        form {
            transform: translateZ(25px); /* Mid-level 3D pop */
        }

        .input-group {
            margin-bottom: 2.2rem;
            position: relative;
        }

        .input-label {
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: var(--cyan-glow);
            padding: 1.25rem;
            font-size: 1.05rem;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            backdrop-filter: blur(10px);
        }

        .input-field:focus {
            border-color: var(--cyan-glow);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 0 1px var(--cyan-glow), 0 0 20px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.15);
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%);
            color: #000;
            border: none;
            padding: 1.35rem;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 1.5rem;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            transform: translateZ(15px);
        }

        /* Button Sweep Effect */
        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: left 0.6s ease;
        }

        .auth-btn:hover {
            background: var(--cyan-glow);
            color: #000;
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.4), 0 0 15px var(--cyan-glow);
            transform: translateY(-3px) translateZ(20px);
            letter-spacing: 0.25em;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:active {
            transform: translateY(1px) translateZ(10px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3);
        }

        .system-msg {
            color: #ff3366; /* Hot neon pink/red for error */
            font-size: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
            margin-top: 1.8rem;
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(255,51,102,0.5);
        }

        .system-msg.show {
            opacity: 1;
        }

    </style>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="gov-topbar">
        <div class="topbar-text">
            <div class="status-dot"></div>
            Montserrat Outer Network
        </div>
        <div class="topbar-text" style="color: var(--text-dim)">
            ENCRYPTED COMMS
        </div>
    </div>

    <!-- Background Tech Effects -->
    <canvas id="starCanvas"></canvas>
    <div class="ambient-glow"></div>
    
    <!-- Main Auth Panel -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="auth-panel" id="authPanel">
            
            <div class="brand-header">
                <div class="gold-line"></div>
                <h1 class="system-title">Identity Verification</h1>
                <div class="system-subtitle">Vanguard Access Array</div>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <div class="input-label">
                        <span>Subject Clearance</span>
                        <span style="color: rgba(255,255,255,0.2)">[REQ]</span>
                    </div>
                    <input type="text" id="username" class="input-field" placeholder="Admin ID" autocomplete="off" required>
                </div>
                
                <div class="input-group">
                    <div class="input-label">
                        <span>Authorization Phrase</span>
                        <span style="color: rgba(255,255,255,0.2)">[REQ]</span>
                    </div>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Initialize Protocol</button>
                <div id="errorMsg" class="system-msg">Protocol Failed. Access Denied.</div>
            </form>
        </div>
    </div>

    <script>
        // --- EXTRAORDINARY STARRY BACKGROUND ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let comets = [];
        const numStars = 400; // Even denser space

        // Mouse tracking for parallax
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - windowHalfX) * 0.05; // Base parallax amount
            mouseY = (e.clientY - windowHalfY) * 0.05;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width * 2 - canvas.width * 0.5;
                this.y = Math.random() * canvas.height * 2 - canvas.height * 0.5;
                this.z = Math.random() * canvas.width; // Depth
                this.radius = Math.random() * 1.2 + 0.2;
                this.colorBase = Math.random();
                // 10% chance of being cyan/blue, 90% white/grey
                if (this.colorBase > 0.95) this.color = 'rgba(0, 240, 255, '; // Cyan
                else if (this.colorBase > 0.85) this.color = 'rgba(74, 143, 231, '; // Blue
                else this.color = 'rgba(255, 255, 255, '; // White
                
                this.speedModifier = Math.random() * 0.5 + 0.1;
            }

            update(warpSpeed = false) {
                // Move stars slowly towards the camera (decreasing Z)
                this.z -= warpSpeed ? 30 : this.speedModifier; 
                
                if (this.z <= 0) {
                    this.z = canvas.width;
                    this.x = Math.random() * canvas.width * 2 - canvas.width * 0.5;
                    this.y = Math.random() * canvas.height * 2 - canvas.height * 0.5;
                }
            }

            draw() {
                // Parallax smoothing
                targetX += (mouseX - targetX) * 0.02;
                targetY += (mouseY - targetY) * 0.02;

                const fov = 400; 
                const scale = fov / (fov + this.z);
                
                // Apply perspective AND parallax offset based on depth
                const x = (this.x - canvas.width / 2) * scale + canvas.width / 2 - (targetX * (canvas.width/this.z)*2);
                const y = (this.y - canvas.height / 2) * scale + canvas.height / 2 - (targetY * (canvas.width/this.z)*2);
                
                const radius = this.radius * scale * 2;
                const opacity = Math.min(1, Math.max(0.1, 1 - (this.z / canvas.width)) + (Math.random() * 0.2)); // Slight twinkle

                if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + opacity + ')';
                    ctx.fill();
                    
                    // Add glow to close/bright stars
                    if (scale > 0.8) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = this.color + opacity + ')';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        class Comet {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width * 1.5;
                this.y = -100;
                this.length = Math.random() * 80 + 40;
                this.speedX = -Math.random() * 8 - 4;
                this.speedY = Math.random() * 8 + 4;
                this.opacity = 0;
                this.active = false;
                this.delay = Math.random() * 400 + 100; // Frames to wait
            }

            update() {
                if (!this.active) {
                    this.delay--;
                    if (this.delay <= 0) this.active = true;
                    return;
                }

                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.opacity < 1 && this.y < canvas.height / 2) this.opacity += 0.05;
                if (this.y > canvas.height * 0.8) this.opacity -= 0.05;

                if (this.y > canvas.height + 100 || this.x < -100) {
                    this.reset();
                }
            }

            draw() {
                if (!this.active || this.opacity <= 0) return;

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.speedX * this.length * 0.1, this.y - this.speedY * this.length * 0.1);
                
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x - this.speedX * this.length * 0.1, this.y - this.speedY * this.length * 0.1);
                gradient.addColorStop(0, `rgba(0, 240, 255, ${this.opacity})`);
                gradient.addColorStop(1, `rgba(0, 240, 255, 0)`);
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        for (let i = 0; i < numStars; i++) stars.push(new Star());
        for (let i = 0; i < 3; i++) comets.push(new Comet()); // 3 concurrent possible comets

        let isWarping = false;

        function animateSpace() {
            // Very dark trail for ultra smooth space look
            ctx.fillStyle = 'rgba(3, 4, 6, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.update(isWarping);
                star.draw();
            });

            if(!isWarping) {
                comets.forEach(comet => {
                    comet.update();
                    comet.draw();
                });
            }

            requestAnimationFrame(animateSpace);
        }
        animateSpace();

        // --- MAGNETIC 3D PANEL EFFECT ---
        const wrapper = document.getElementById('loginWrapper');
        const panel = document.getElementById('authPanel');
        let bounds;
        
        // Calculate bounds efficiently
        function updateBounds() { bounds = panel.getBoundingClientRect(); }
        window.addEventListener('resize', updateBounds);
        
        setTimeout(() => {
            updateBounds();
            wrapper.addEventListener('mousemove', (e) => {
                if(isWarping) return;
                // Get mouse position relative to the EXACT center of the card
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const leftX = mouseX - bounds.x;
                const topY = mouseY - bounds.y;
                const center = { x: leftX - bounds.width / 2, y: topY - bounds.height / 2 };
                
                // Magnetic intensity (higher divisor = less rotation)
                const xAxis = center.x / 18; 
                const yAxis = -center.y / 18;
                
                panel.style.transform = `scale(1.02) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                
                // Dynamic glare effect opposite to mouse
                const glareX = 50 + (center.x / bounds.width) * 100;
                const glareY = 50 + (center.y / bounds.height) * 100;
                
                panel.style.background = `
                    radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.06) 0%, transparent 40%),
                    var(--glass)
                `;
            });

            wrapper.addEventListener('mouseleave', () => {
                if(isWarping) return;
                panel.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                panel.style.transform = `scale(1) rotateY(0deg) rotateX(0deg)`;
                panel.style.background = `var(--glass)`;
                
                setTimeout(() => {
                    panel.style.transition = 'transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.1s cubic-bezier(0.2, 0.8, 0.2, 1)';
                }, 600);
            });
        }, 1800); 


        // --- AUTHENTICATION LOGIC ---
        function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            const validUser = "admin";
            const validPass = "MID2026";

            if (user === validUser && pass === validPass) {
                // Success Sequence - HYPERDRIVE
                errorElement.classList.remove('show');
                submitBtn.style.backgroundColor = 'var(--cyan-glow)';
                submitBtn.style.color = '#000';
                submitBtn.style.boxShadow = '0 0 40px var(--cyan-glow)';
                submitBtn.innerHTML = "ENGAGING PROTOCOL...";
                
                isWarping = true; // Trigger hyperdrive in canvas

                // Cyber warp out effect for panel
                setTimeout(() => {
                    panel.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    panel.style.opacity = '0';
                    panel.style.transform = 'translateY(-100px) scale(0.8) translateZ(-200px) rotateX(10deg)';
                    
                    setTimeout(() => {
                        window.location.href = "montserrat-digital-residency.html";
                    }, 800);
                }, 400);

            } else {
                // Error Sequence
                errorElement.classList.add('show');
                
                // Aggressive Shake Effect
                panel.style.transition = 'none'; 
                panel.style.animation = 'none';
                panel.offsetHeight; /* trigger reflow */
                panel.style.animation = 'hackerShake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                
                // Glitch border color red temporarily
                panel.style.border = '1px solid rgba(255, 51, 102, 0.6)';
                panel.style.boxShadow = '0 0 60px rgba(255, 51, 102, 0.2)';

                setTimeout(() => {
                    document.getElementById('password').value = '';
                    panel.style.border = '1px solid rgba(255, 255, 255, 0.1)';
                    panel.style.borderTop = '1px solid rgba(255, 255, 255, 0.2)';
                    panel.style.borderBottom = '1px solid rgba(0, 0, 0, 0.5)';
                    panel.style.boxShadow = '0 40px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.15), inset 0 0 40px rgba(74, 143, 231, 0.05)';
                    panel.style.transition = 'transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.1s cubic-bezier(0.2, 0.8, 0.2, 1)';
                }, 500);
            }
        }

        // Add Hacker Shake CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes hackerShake {
                0%, 100% { transform: scale(1) translateX(0); }
                20% { transform: scale(1.02) translateX(-12px) rotateZ(-1deg); }
                40% { transform: scale(1.02) translateX(12px) rotateZ(1deg); }
                60% { transform: scale(1.02) translateX(-8px) rotateZ(-0.5deg); }
                80% { transform: scale(1.02) translateX(8px) rotateZ(0.5deg); }
            }
        `;
        document.head.appendChild(style);

        // Immediate focus
        document.getElementById('username').focus();
    </script>
</body>
</html>
