<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MID - Secure National Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-primary: #00ffcc; /* Cyan/Green futuristic */
            --accent-glow: rgba(0, 255, 204, 0.4);
            --text-main: #ffffff;
            --text-dimmed: #8a9ba8;
            --panel-bg: rgba(10, 15, 20, 0.7);
            --panel-border: rgba(0, 255, 204, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Matrix Canvas Background */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.35; /* Keep it subtle so it doesn't overpower */
        }

        /* Scanline Overlay for retro-futuristic CRT monitor effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Login Panel */
        .auth-panel {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3.5rem 3rem;
            border-radius: 4px; /* Sharper corners for authoritative tech feel */
            border: 1px solid var(--panel-border);
            border-top: 2px solid var(--accent-primary);
            width: 100%;
            max-width: 460px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(0, 255, 204, 0.05);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
        }

        /* Corner accents for the panel */
        .auth-panel::before, .auth-panel::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid var(--accent-primary);
            transition: all 0.3s ease;
        }
        .auth-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .auth-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        /* Authoritative Crest/Logo Area */
        .crest-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem auto;
            border: 1px solid var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
            position: relative;
        }
        
        .crest-icon::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 1px dashed rgba(0, 255, 204, 0.3);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .crest-icon svg {
            width: 30px;
            height: 30px;
            fill: var(--accent-primary);
        }

        .system-title {
            font-family: 'Cinzel', serif; /* Authoritative serif font for the title */
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .system-status {
            color: var(--accent-primary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            animation: blink 1.5s infinite alternate;
        }

        @keyframes blink { 0% { opacity: 0.3; box-shadow: none; } 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-primary); } }

        .input-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            color: var(--text-dimmed);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-primary);
            padding: 1rem;
            font-size: 1rem;
            font-family: monospace; /* Monospace for tech feel */
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent-primary);
            background: rgba(0, 255, 204, 0.03);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1) inset;
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .auth-btn {
            width: 100%;
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.2), transparent);
            transition: all 0.4s ease;
        }

        .auth-btn:hover {
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        
        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .system-msg {
            color: #ff3333;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1.5rem;
            font-family: monospace;
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .system-msg.show {
            opacity: 1;
        }

        .encryption-tag {
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.65rem;
            font-family: monospace;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>
    
    <!-- Main Auth Panel -->
    <div class="auth-panel" id="authPanel">
        <div class="header-section">
            <div class="crest-icon">
                <!-- SVG Shield/Crest icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            <h1 class="system-title">MID SECURE CORE</h1>
            <div class="system-status">
                <div class="status-dot"></div>
                RESTRICTED CLEARANCE REQUIRED
            </div>
        </div>

        <form id="loginForm" onsubmit="handleAuth(event)">
            <div class="input-group">
                <div class="input-label">
                    <span>Identity Hash</span>
                    <span style="color: rgba(255,255,255,0.2)">[USR_REQ]</span>
                </div>
                <input type="text" id="username" class="input-field" placeholder="ID-XXXXXXXX" autocomplete="off" required>
            </div>
            
            <div class="input-group">
                <div class="input-label">
                    <span>Cryptographic Key</span>
                    <span style="color: rgba(255,255,255,0.2)">[KEY_REQ]</span>
                </div>
                <input type="password" id="password" class="input-field" placeholder="••••••••••••" required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Initialize Protocol</button>
            <div id="errorMsg" class="system-msg">ERR_403: ACCESS DENIED. UNAUTHORIZED ENTITY.</div>
        </form>
        
        <div class="encryption-tag">AES-256-GCM ENCRYPTED CONNECTION</div>
    </div>

    <script>
        // --- MATRIX RAIN EFFECT ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas to full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Characters to use in the rain (Hex, Katakana, Binary)
        const chars = '01 ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ 日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ';
        const charArray = chars.split('');
        
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        // Initialize drop positions (random starting heights)
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100; 
        }

        function drawMatrix() {
            // Black background with extreme opacity to create trailing effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ffcc'; // Cyber cyan/green text
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Random character
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                
                // Draw the character
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reset drop to top randomly if it goes off screen
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                
                // Move drop down
                drops[i]++;
            }
        }
        
        // Run animation
        setInterval(drawMatrix, 33);

        // --- AUTHENTICATION LOGIC ---
        function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const panel = document.getElementById('authPanel');

            const validUser = "admin";
            const validPass = "MID2026";

            if (user === validUser && pass === validPass) {
                // Success Sequence
                errorElement.classList.remove('show');
                submitBtn.style.backgroundColor = 'rgba(0, 255, 204, 0.2)';
                submitBtn.style.color = '#fff';
                submitBtn.innerHTML = "DECRYPTING... ACCESS GRANTED";
                
                // Glitch out the panel before redirecting
                setTimeout(() => {
                    panel.style.transform = 'scale(1.05)';
                    panel.style.filter = 'blur(2px) hue-rotate(90deg)';
                    panel.style.opacity = '0';
                    
                    setTimeout(() => {
                        window.location.href = "montserrat-digital-residency.html";
                    }, 400);
                }, 800);

            } else {
                // Error Sequence
                errorElement.classList.add('show');
                
                // Authoritative Hacker Shake
                panel.style.animation = 'none';
                panel.offsetHeight; /* trigger reflow */
                panel.style.animation = 'glitchShake 0.3s cubic-bezier(.36,.07,.19,.97) both';
                
                // Clear inputs on failure for security feel
                setTimeout(() => {
                    document.getElementById('password').value = '';
                }, 300);
            }
        }

        // Add Glitch Shake CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes glitchShake {
                0% { transform: translate(0) }
                20% { transform: translate(-15px, 5px) }
                40% { transform: translate(15px, -5px) }
                60% { transform: translate(-10px, 2px) }
                80% { transform: translate(10px, -2px) }
                100% { transform: translate(0) }
            }
        `;
        document.head.appendChild(style);

        // Focus text effect
        document.getElementById('username').focus();
    </script>
</body>
</html>
