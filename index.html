<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MID - Secure Authentication Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium dark palette from main site */
            --black-deep: #050507;
            --black: #0A0C10;
            --black-elevated: #14161D;
            
            /* Blue accent — trust, reliability, innovation */
            --blue: #4A8FE7;
            --blue-light: #6BA3ED;
            --blue-glow: rgba(74,143,231,0.15);
            --blue-strong: rgba(74,143,231,0.3);

            /* Text hierarchy */
            --text-bright: #F4F5F7;
            --text-primary: #D4D8E0;
            --text-dim: #6B7280;

            /* Surfaces */
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(74,143,231,0.4);
            --glass: rgba(10,12,16,0.7);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* High-Tech Grid Background */
        .tech-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            opacity: 0.15;
            z-index: 0;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
            animation: gridMove 20s linear infinite;
        }

        /* Center glowing orb */
        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, var(--blue-glow) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) scale(2.5); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) scale(2.5); }
        }

        /* Top Bar Gov Simulation */
        .gov-topbar {
            width: 100%;
            background: var(--black);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            position: absolute;
            top: 0;
        }

        .topbar-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background-color: var(--blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Main Login Panel */
        .login-wrapper {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
        }

        .auth-panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 4rem 3.5rem;
            border-radius: 1px; /* Sharp edges for authoritative tech */
            border: 1px solid var(--border);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            animation: panelEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* High-tech corner cutouts */
        .auth-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
        }

        @keyframes panelEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .gold-line {
            width: 40px;
            height: 2px;
            background: var(--blue);
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 10px var(--blue-glow);
        }

        .system-title {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text-bright);
            margin-bottom: 0.5rem;
        }

        .system-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-label {
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-field {
            width: 100%;
            background: var(--black-deep);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 1.2rem;
            font-size: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 2px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--blue);
            background: var(--black-elevated);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        .input-field::placeholder {
            color: #333945;
        }

        .auth-btn {
            width: 100%;
            background: var(--text-bright);
            color: var(--black-deep);
            border: none;
            padding: 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .auth-btn:hover {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 10px 20px var(--blue-glow);
            transform: translateY(-1px);
        }

        .auth-btn:active {
            transform: translateY(1px);
        }

        .system-msg {
            color: #ff4757;
            font-size: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
            margin-top: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .system-msg.show {
            opacity: 1;
        }

        .decoration-line {
            position: absolute;
            bottom: -1px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
    </style>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="gov-topbar">
        <div class="topbar-text">
            <div class="status-dot"></div>
            Montserrat Sovereign Network
        </div>
        <div class="topbar-text" style="color: var(--blue)">
            ENCRYPTED CONNECTION
        </div>
    </div>

    <!-- Background Tech Effects -->
    <div class="tech-grid"></div>
    <div class="ambient-glow"></div>
    
    <!-- Main Auth Panel -->
    <div class="login-wrapper">
        <div class="auth-panel" id="authPanel">
            <div class="decoration-line"></div>
            
            <div class="brand-header">
                <div class="gold-line"></div>
                <h1 class="system-title">Identity Verification</h1>
                <div class="system-subtitle">Restricted Access Array</div>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <div class="input-label">
                        <span>Credentials</span>
                        <span>[REQ]</span>
                    </div>
                    <input type="text" id="username" class="input-field" placeholder="Admin ID" autocomplete="off" required>
                </div>
                
                <div class="input-group">
                    <div class="input-label">
                        <span>Passcode</span>
                        <span>[REQ]</span>
                    </div>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Authenticate</button>
                <div id="errorMsg" class="system-msg">Authentication Failed. Invalid Credentials.</div>
            </form>
        </div>
    </div>

    <script>
        function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const panel = document.getElementById('authPanel');

            const validUser = "admin";
            const validPass = "MID2026";

            if (user === validUser && pass === validPass) {
                // Success Sequence
                errorElement.classList.remove('show');
                submitBtn.style.backgroundColor = 'var(--blue)';
                submitBtn.style.color = '#fff';
                submitBtn.innerHTML = "VERIFYING...";
                
                // Subtle slide out
                setTimeout(() => {
                    panel.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                    panel.style.opacity = '0';
                    panel.style.transform = 'translateY(-20px) scale(0.98)';
                    
                    setTimeout(() => {
                        window.location.href = "montserrat-digital-residency.html";
                    }, 600);
                }, 600);

            } else {
                // Error Sequence
                errorElement.classList.add('show');
                
                // Premium Shake Effect
                panel.style.animation = 'none';
                panel.offsetHeight; /* trigger reflow */
                panel.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                
                setTimeout(() => {
                    document.getElementById('password').value = '';
                }, 400);
            }
        }

        // Add Shake CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
            }
        `;
        document.head.appendChild(style);

        // Immediate focus
        document.getElementById('username').focus();
    </script>
</body>
</html>
