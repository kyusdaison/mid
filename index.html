<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MID - Secure Authentication Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Strictly Official Montserrat Palette */
            --black-deep: #050507; 
            --black: #0A0C10;
            --black-elevated: #14161D;
            
            --blue: #4A8FE7;
            --blue-light: #6BA3ED;
            
            /* Text hierarchy */
            --text-bright: #F4F5F7;
            --text-primary: #D4D8E0;
            --text-dim: #8B92A0;

            /* Surfaces */
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(74,143,231,0.4);
            --glass: rgba(10, 12, 16, 0.7); 
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* Starry Background Canvas - Calm & Deep */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.85;
            mix-blend-mode: screen;
        }

        /* Center glowing aura */
        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50vw; height: 50vw;
            max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(74, 143, 231, 0.08) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* Top Bar Gov Simulation */
        .gov-topbar {
            width: 100%;
            background: linear-gradient(180deg, rgba(5, 7, 10, 0.9) 0%, transparent 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            position: absolute;
            top: 0;
        }

        .topbar-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background-color: var(--blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--blue);
            animation: pulseFast 2s infinite alternate ease-in-out;
        }

        @keyframes pulseFast {
            0% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Main Login Panel Wrapper */
        .login-wrapper {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.5rem;
            transform-style: preserve-3d;
        }

        /* Refined, smaller, more delicate panel */
        .auth-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem; /* Tighter padding */
            border-radius: 8px; /* Sharper, more delicate corners */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            width: 100%;
            max-width: 380px; /* Smaller max width for compactness */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: panelEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            transition: transform 0.1s linear, box-shadow 0.1s linear;
            transform-style: preserve-3d;
        }

        .auth-panel::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 40%, transparent 60%, rgba(74,143,231,0.1) 100%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes panelEntrance {
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0) rotateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
            transform: translateZ(20px); 
        }

        /* Classic blue badge line */
        .blue-line {
            width: 30px;
            height: 2px;
            background: var(--blue);
            margin: 0 auto 1.2rem auto;
            box-shadow: 0 0 10px rgba(74,143,231,0.4);
        }

        .system-title {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: var(--text-bright);
            margin-bottom: 0.4rem;
        }

        .system-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.9;
        }

        form {
            transform: translateZ(15px);
        }

        .input-group {
            margin-bottom: 1.6rem;
            position: relative;
        }

        .input-label {
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.65rem;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-field {
            width: 100%;
            background: rgba(5, 7, 10, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-bright);
            padding: 1rem 1.2rem;
            font-size: 0.9rem;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 4px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--blue);
            background: rgba(10, 12, 16, 0.8);
            box-shadow: 0 0 0 1px rgba(74,143,231,0.2);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.15);
        }

        .auth-btn {
            width: 100%;
            background: var(--text-bright);
            color: var(--black-deep);
            border: none;
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            border-radius: 4px;
            transform: translateZ(10px);
        }

        .auth-btn:hover {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 8px 20px rgba(74, 143, 231, 0.3);
            transform: translateY(-1px) translateZ(10px);
        }

        .system-msg {
            color: #E74C3C; /* Muted standard error red */
            font-size: 0.7rem;
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
            margin-top: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .system-msg.show {
            opacity: 1;
        }

    </style>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="gov-topbar">
        <div class="topbar-text">
            <div class="status-dot"></div>
            Montserrat Sovereign Network
        </div>
        <div class="topbar-text" style="color: var(--text-dim)">
            ENCRYPTED COMMS
        </div>
    </div>

    <!-- Background Tech Effects -->
    <canvas id="starCanvas"></canvas>
    <div class="ambient-glow"></div>
    
    <!-- Main Auth Panel -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="auth-panel" id="authPanel">
            
            <div class="brand-header">
                <div class="blue-line"></div>
                <h1 class="system-title">Identity Verification</h1>
                <div class="system-subtitle">Restricted Access Array</div>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <div class="input-label">
                        <span>Subject Clearance</span>
                        <span style="color: rgba(255,255,255,0.3)">[REQ]</span>
                    </div>
                    <input type="text" id="username" class="input-field" placeholder="Admin ID" autocomplete="off" required>
                </div>
                
                <div class="input-group">
                    <div class="input-label">
                        <span>Authorization Phrase</span>
                        <span style="color: rgba(255,255,255,0.3)">[REQ]</span>
                    </div>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Initialize Protocol</button>
                <div id="errorMsg" class="system-msg">Protocol Failed. Access Denied.</div>
            </form>
        </div>
    </div>

    <script>
        // --- CALM DEEP SPACE BACKGROUND ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 350; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * canvas.width; 
                this.radius = Math.random() * 1.0 + 0.2;
                
                // Keep colors strictly Montserrat brand / white
                if (Math.random() > 0.9) this.color = 'rgba(74, 143, 231, '; // Trust Blue
                else this.color = 'rgba(255, 255, 255, '; // White
                
                this.speedModifier = Math.random() * 0.2 + 0.05; // Very slow, calm movement
            }

            update(warpSpeed = false) {
                // Calm, constant movement forward, no mouse tracking
                this.z -= warpSpeed ? 20 : this.speedModifier; 
                
                if (this.z <= 0) {
                    this.z = canvas.width;
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                }
            }

            draw() {
                const fov = 400; 
                const scale = fov / (fov + this.z);
                
                const x = (this.x - canvas.width / 2) * scale + canvas.width / 2;
                const y = (this.y - canvas.height / 2) * scale + canvas.height / 2;
                
                const radius = this.radius * scale;
                const opacity = Math.min(1, Math.max(0.1, 1 - (this.z / canvas.width)));

                if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + opacity + ')';
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < numStars; i++) stars.push(new Star());

        let isWarping = false;

        function animateSpace() {
            ctx.fillStyle = 'rgba(5, 5, 7, 0.6)'; // Very dark base
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.update(isWarping);
                star.draw();
            });

            requestAnimationFrame(animateSpace);
        }
        animateSpace();

        // --- SUBTLE 3D PANEL TILT ---
        const wrapper = document.getElementById('loginWrapper');
        const panel = document.getElementById('authPanel');
        
        setTimeout(() => {
            wrapper.addEventListener('mousemove', (e) => {
                if(isWarping) return;
                
                // Very subtle tilt mapping
                const xAxis = (window.innerWidth / 2 - e.pageX) / 80; 
                const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
                
                panel.style.transform = `scale(1.01) rotateY(${xAxis}deg) rotateX(${yAxis * -1}deg)`;
                panel.style.boxShadow = `
                    ${xAxis}px ${yAxis + 20}px 50px rgba(0,0,0,0.7),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05)
                `;
            });

            wrapper.addEventListener('mouseleave', () => {
                if(isWarping) return;
                panel.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                panel.style.transform = `scale(1) rotateY(0deg) rotateX(0deg)`;
                panel.style.boxShadow = `0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05)`;
                
                setTimeout(() => {
                    panel.style.transition = 'transform 0.1s linear, box-shadow 0.1s linear';
                }, 600);
            });
        }, 1500); 

        // --- AUTHENTICATION LOGIC ---
        function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            const validUser = "admin";
            const validPass = "MID2026";

            if (user === validUser && pass === validPass) {
                // Success Sequence - HYPERDRIVE
                errorElement.classList.remove('show');
                submitBtn.style.backgroundColor = 'var(--blue)';
                submitBtn.style.color = '#fff';
                submitBtn.style.boxShadow = '0 0 20px rgba(74, 143, 231, 0.4)';
                submitBtn.innerHTML = "VERIFYING...";
                
                isWarping = true; 

                // Cyber warp out effect for panel
                setTimeout(() => {
                    panel.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    panel.style.opacity = '0';
                    panel.style.transform = 'translateY(-60px) scale(0.9) translateZ(-150px) rotateX(5deg)';
                    
                    setTimeout(() => {
                        window.location.href = "montserrat-digital-residency.html";
                    }, 800);
                }, 400);

            } else {
                // Error Sequence
                errorElement.classList.add('show');
                
                // Aggressive Shake Effect
                panel.style.transition = 'none'; 
                panel.style.animation = 'none';
                panel.offsetHeight; /* trigger reflow */
                panel.style.animation = 'hackerShake 0.4s cubic-bezier(.36,.07,.19,.97) both';

                setTimeout(() => {
                    document.getElementById('password').value = '';
                    panel.style.transition = 'transform 0.1s linear, box-shadow 0.1s linear';
                }, 400);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes hackerShake {
                0%, 100% { transform: scale(1) translateX(0); }
                20% { transform: scale(1.01) translateX(-8px); }
                40% { transform: scale(1.01) translateX(8px); }
                60% { transform: scale(1.01) translateX(-4px); }
                80% { transform: scale(1.01) translateX(4px); }
            }
        `;
        document.head.appendChild(style);

        document.getElementById('username').focus();
    </script>
</body>
</html>
